# One-time workflow: run this manually ONCE after first pushing to generate
# and commit the gradle-wrapper.jar. After that it's committed and this
# workflow is no longer needed.
name: Generate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle and generate wrapper
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.0-bin.zip -o gradle.zip
          unzip -q gradle.zip
          ./gradle-8.0/bin/gradle wrapper --gradle-version 8.0
      - name: Commit wrapper jar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/gradle-wrapper.jar gradlew gradlew.bat
          git commit -m "chore: add gradle wrapper jar" || echo "Nothing to commit"
          git push
