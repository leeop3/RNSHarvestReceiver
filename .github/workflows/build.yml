name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ─── Job 1: Unit Tests ──────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download gradle-wrapper.jar
        run: |
          curl -sL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar: $(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: Run unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  # ─── Job 2: Build Debug APK ─────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download gradle-wrapper.jar
        run: |
          curl -sL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar: $(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: Remove legacy files still tracked in git
        run: |
          git config user.email "ci@build"
          git config user.name "CI"
          git rm --cached --ignore-unmatch \
            app/src/main/java/com/harvest/rns/ui/radio/RadioConfigFragment.kt \
            app/src/main/res/layout/fragment_radio_config.xml \
            app/src/main/java/com/harvest/rns/network/rns/RnsIdentity.kt \
            app/src/main/java/com/harvest/rns/network/rns/RnsFrameDecoder.kt \
            app/src/main/java/com/harvest/rns/network/rns/RnsAnnounceParser.kt \
            app/src/main/java/com/harvest/rns/network/lxmf/LxmfMessageParser.kt \
            app/src/main/java/com/harvest/rns/network/bluetooth/BluetoothRNodeManager.kt \
            "app/src/main/java/com/palm/harvest/ui/MainUIComponents.kt" || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with build number
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/RNSHarvestReceiver-debug-${{ github.run_number }}.apk

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RNSHarvestReceiver-debug-${{ github.run_number }}
          path: artifacts/RNSHarvestReceiver-debug-${{ github.run_number }}.apk
          retention-days: 30

  # ─── Job 3: Build Release APK ───────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download gradle-wrapper.jar
        run: |
          curl -sL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Build Signed Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/release.keystore
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Build Unsigned Release APK
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RNSHarvestReceiver-release-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  # ─── Job 4: GitHub Release on version tag ───────────────────────────────────
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-debug
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download gradle-wrapper.jar
        run: |
          curl -sL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RNS Harvest Receiver ${{ github.ref_name }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
